---
- name: Setup macOS development environment
  hosts: localhost
  connection: local
  vars:
    tag_groups:
      rust: ["rust-platform", "rust-tools"]
      python: ["python-platform", "python-tools"]
      nodejs: ["nodejs-platform", "nodejs-tools"]
      go: ["go-platform", "go-tools"]
    full_setup_tags:
      - brew-formulae
      - ollama
      - shell
      - system
      - git
      - gh
      - python-platform
      - nodejs-platform
      - ruby
      - rust-platform
      - go-platform
      - python-tools
      - uv
      - nodejs-tools
      - rust-tools
      - go-tools
      - vscode
      - cursor
      - coder
      - mlx
      - xcode
  roles:
    - { role: brew, tags: ["brew-formulae", "brew-f", "brew-cask", "brew-c"] }
    - { role: python, tags: ["python-platform", "py-p", "python-tools", "py-t", "uv"] }
    - { role: nodejs, tags: ["nodejs-platform", "nd-p", "nodejs-tools", "nd-t", "coder", "cdr"] }
    - { role: ruby, tags: ["ruby", "rb"] }
    - { role: rust, tags: ["rust-platform", "rs-p", "rust-tools", "rs-t"] }
    - { role: go, tags: ["go-platform", "go-p", "go-tools", "go-t"] }
    - { role: git, tags: ["git"] }
    - { role: gh, tags: ["gh"] }
    - { role: shell, tags: ["shell", "sh"] }
    - { role: ssh, tags: ["ssh"] }
    - { role: editor, tags: ["vscode", "co", "cursor", "cur", "antigravity", "agy", "xcode", "xc"] }
    - { role: system, tags: ["system", "sys"] }
    - { role: llm, tags: ["ollama", "ol", "ollama-models", "ol-m", "mlx", "mlx-models"] }
