---
- name: "Install git"
  community.general.homebrew:
    name: git
    state: present

- name: "Ensure .config/git directory exists"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/git"
    state: directory
    mode: "0755"

- name: "Symlink .gitconfig"
  ansible.builtin.file:
    src: "{{ local_config_root }}/git/global/.gitconfig"
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/git/config"
    state: link
    force: true

- name: "Symlink .gitignore_global"
  ansible.builtin.file:
    src: "{{ local_config_root }}/git/global/.gitignore_global"
    dest: "{{ ansible_facts['env']['HOME'] }}/.gitignore_global"
    state: link
    force: true

- name: "Set global git config for excludesfile"
  community.general.git_config:
    name: core.excludesfile
    scope: global
    value: "{{ ansible_facts['env']['HOME'] }}/.gitignore_global"
