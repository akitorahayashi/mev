---
- name: "Set Ruby version variable from file"
  ansible.builtin.slurp:
    src: "{{ local_config_root }}/ruby/global/.ruby-version"
  register: ruby_version_file

- name: "Set Ruby version fact"
  ansible.builtin.set_fact:
    ruby_version: "{{ ruby_version_file.content | b64decode | trim }}"

- name: "Install Ruby platform packages"
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  loop:
    - openssl@3
    - rbenv
    - ruby-build

- name: "Find Homebrew prefix"
  ansible.builtin.command:
    cmd: "brew --prefix"
  register: ruby_homebrew_prefix
  changed_when: false

- name: "Set Homebrew binary path"
  ansible.builtin.set_fact:
    ruby_homebrew_bin_path: "{{ ruby_homebrew_prefix.stdout }}/bin"

- name: "Find OpenSSL prefix"
  ansible.builtin.command:
    cmd: "brew --prefix openssl@3"
  register: ruby_openssl_prefix
  changed_when: false
  environment:
    PATH: "{{ ruby_homebrew_bin_path }}:{{ ansible_facts['env']['PATH'] }}"

- name: "Install specified Ruby version with rbenv"
  ansible.builtin.command:
    cmd: "rbenv install {{ ruby_version }} --skip-existing"
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.rbenv/versions/{{ ruby_version }}"
  environment:
    PATH: "{{ ruby_homebrew_bin_path }}:{{ ansible_facts['env']['PATH'] }}"
    RUBY_CONFIGURE_OPTS: "--with-openssl-dir={{ ruby_openssl_prefix.stdout }}"

- name: "Set global Ruby version"
  ansible.builtin.command:
    cmd: "rbenv global {{ ruby_version }}"
  changed_when: false
  environment:
    PATH: "{{ ruby_homebrew_bin_path }}:{{ ansible_facts['env']['PATH'] }}"

- name: "Rehash rbenv shims"
  ansible.builtin.command:
    cmd: "rbenv rehash"
  changed_when: false
  environment:
    PATH: "{{ ruby_homebrew_bin_path }}:{{ ansible_facts['env']['PATH'] }}"

- name: "Install bundler gem (version 2.5.22)"
  ansible.builtin.command:
    cmd: "gem install bundler -v 2.5.22 --no-document"
  changed_when: false
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.rbenv/shims:{{ ruby_homebrew_bin_path }}:{{ ansible_facts['env']['PATH'] }}"
