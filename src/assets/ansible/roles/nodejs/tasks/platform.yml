---
- name: "Install fnm, jq, and pnpm"
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  loop:
    - fnm
    - jq
    - pnpm

- name: "Install specified Node.js version with fnm"
  ansible.builtin.command:
    cmd: "fnm install {{ nodejs_version }} --progress=never"
  changed_when: false
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"

- name: "Set default Node.js version"
  ansible.builtin.command:
    cmd: "fnm default {{ nodejs_version }}"
  changed_when: false
  environment:
    PATH: "/opt/homebrew/bin:{{ ansible_facts['env']['PATH'] }}"
