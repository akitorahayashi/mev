---
version: "1"
git_protocol: ssh
prompt: disabled
spinner: enabled
aliases:
  # gh organization aliases
  or: org
  or-ls: org list
  # gh branch aliases
  br-df: "!mev internal gh branch-diff"
  # gh PR aliases (gho handles list, these handle mutation)
  pr-ct: "!mev internal gh pr-comments"
  pr-mr: "!mev internal gh pr-merge-ready"
