---
- name: "Symlink .zprofile"
  ansible.builtin.file:
    src: "{{ local_config_root }}/shell/common/.zprofile"
    dest: "{{ ansible_facts['env']['HOME'] }}/.zprofile"
    state: link
    force: true

- name: "Symlink .zshrc"
  ansible.builtin.file:
    src: "{{ local_config_root }}/shell/common/.zshrc"
    dest: "{{ ansible_facts['env']['HOME'] }}/.zshrc"
    state: link
    force: true

# --- create symbolic links for all files in local_config_root/shell/common/alias/
- name: "Clean and recreate ~/.mev/alias directory"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.mev/alias"
    state: absent

- name: "Create ~/.mev/alias directory"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.mev/alias"
    state: directory
    mode: "0755"

- name: "Find shell config files recursively"
  ansible.builtin.find:
    paths: "{{ local_config_root }}/shell/common/alias"
    patterns: ["*.sh", "*.zsh"]
    recurse: true
  register: shell_config_files

- name: "Calculate unique subdirectories for shell config files"
  ansible.builtin.set_fact:
    shell_config_subdirs: >-
      {{ shell_config_files.files | map(attribute='path')
         | map('replace', local_config_root + '/shell/common/alias/', '')
         | map('dirname') | unique | reject('equalto', '.') | list }}

- name: "Create subdirectories in ~/.mev/alias"
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.mev/alias/{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ shell_config_subdirs }}"

- name: "Symlink shell config files recursively"
  ansible.builtin.file:
    src: "{{ item.path }}"
    dest: >-
      {{ ansible_facts['env']['HOME'] }}/.mev/alias/{{ item.path | replace(local_config_root + '/shell/common/alias/', '') }}
    state: link
    force: true
  loop: "{{ shell_config_files.files }}"
