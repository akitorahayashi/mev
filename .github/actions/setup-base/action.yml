name: Setup Base Environment
description: Install Python, uv, and project dependencies for CI

runs:
  using: "composite"
  steps:
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup just
      uses: extractions/setup-just@v2
      with:
        just-version: 1.46.0

    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2

    - name: Install Ansible and dependencies with uv
      shell: bash
      run: uv sync --frozen

    - name: Expose project virtualenv binaries
      shell: bash
      run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

    - name: Verify ansible-playbook availability
      shell: bash
      run: ansible-playbook --version
