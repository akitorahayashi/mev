name: Setup Base Environment
description: Install Python, just, pipx ansible, and Rust cache for CI

runs:
  using: "composite"
  steps:
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup just
      uses: extractions/setup-just@v2
      with:
        just-version: 1.46.0

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2

    - name: Install ansible with pipx
      shell: bash
      run: |
        python -m pip install --user pipx
        python -m pipx install --force ansible

    - name: Export ansible-playbook binary path
      shell: bash
      run: echo "ANSIBLE_PLAYBOOK_BIN=$HOME/.local/pipx/venvs/ansible/bin/ansible-playbook" >> "$GITHUB_ENV"

    - name: Verify ansible-playbook availability
      shell: bash
      run: "$ANSIBLE_PLAYBOOK_BIN" --version
