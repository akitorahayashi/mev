name: Setup Base Environment
description: Install Python, mise-managed just, pipx ansible, and Rust cache for CI

runs:
  using: "composite"
  steps:
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Setup mise with locked project tools
      uses: jdx/mise-action@v4
      with:
        version: '2026.2.19'
        install_args: --locked just

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2

    - name: Install ansible with pipx and export binary path
      shell: bash
      run: |
        python -m pip install --user pipx==1.8.0
        python -m pipx install --force ansible==11.0.0
        pipx_home="$(python -m pipx environment --value PIPX_HOME)"
        ansible_playbook_bin="${pipx_home}/venvs/ansible/bin/ansible-playbook"
        test -x "$ansible_playbook_bin"
        echo "PIPX_HOME=$pipx_home" >> "$GITHUB_ENV"
        echo "ANSIBLE_PLAYBOOK_BIN=$ansible_playbook_bin" >> "$GITHUB_ENV"

    - name: Verify ansible-playbook availability
      shell: bash
      run: |
        "$ANSIBLE_PLAYBOOK_BIN" --version
