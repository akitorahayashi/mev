name: Build

on:
  workflow_call:

jobs:
  build-darwin-aarch64:
    name: Build mev darwin-aarch64
    runs-on: macos-14
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup base environment
        uses: ./.github/actions/setup-base

      - name: Add Rust target
        run: rustup target add aarch64-apple-darwin

      - name: Build release binary
        run: just build-release-darwin-aarch64

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          cp target/aarch64-apple-darwin/release/mev mev-darwin-aarch64
          chmod +x mev-darwin-aarch64
          shasum -a 256 mev-darwin-aarch64 > mev-darwin-aarch64.sha256

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: mev-darwin-aarch64
          path: |
            mev-darwin-aarch64
            mev-darwin-aarch64.sha256
          retention-days: 1

      - name: Generate artifact attestation
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'mev-darwin-aarch64*'
