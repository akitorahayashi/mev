name: Build

on:
  workflow_call:
    inputs:
      release_id:
        required: false
        type: string

jobs:
  build-darwin-aarch64:
    name: Build mev darwin-aarch64
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup base environment
        uses: ./.github/actions/setup-base

      - name: Add Rust target
        run: rustup target add aarch64-apple-darwin

      - name: Build release binary
        run: mise exec -- just build-release-darwin-aarch64

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          cp target/aarch64-apple-darwin/release/mev mev-darwin-aarch64
          chmod +x mev-darwin-aarch64
          shasum -a 256 mev-darwin-aarch64 > mev-darwin-aarch64.sha256

      - name: Upload release assets
        if: inputs.release_id != ''
        uses: akitorahayashi/gh-release@v1
        with:
          mode: upload
          token: ${{ github.token }}
          release_id: ${{ inputs.release_id }}
          files: |
            mev-darwin-aarch64
            mev-darwin-aarch64.sha256
          overwrite: true
