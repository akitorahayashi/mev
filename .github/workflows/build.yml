name: Build

on:
  workflow_call:

jobs:
  build-darwin-aarch64:
    name: Build mev darwin-aarch64
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup base environment
        uses: ./.github/actions/setup-base

      - name: Add Rust target
        run: rustup target add aarch64-apple-darwin

      - name: Build release binary
        run: just build-release-darwin-aarch64

      - name: Prepare artifact
        shell: bash
        run: |
          set -euo pipefail
          cp target/aarch64-apple-darwin/release/mev mev-darwin-aarch64
          chmod +x mev-darwin-aarch64
          shasum -a 256 mev-darwin-aarch64 > mev-darwin-aarch64.sha256

      - name: Attach release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: |
            mev-darwin-aarch64
            mev-darwin-aarch64.sha256
          generate_release_notes: true
          overwrite_files: true
