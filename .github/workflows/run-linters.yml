name: Run Linters

on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    name: Run format and lint checks
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup base environment
        uses: ./.github/actions/setup-base

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install lint dependencies
        run: uv sync --frozen --extra ci

      - name: Ensure mise is available
        shell: bash
        run: |
          set -euo pipefail
          if command -v mise >/dev/null 2>&1; then
            exit 0
          fi
          curl https://mise.run | MISE_VERSION=2026.3.9 sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Trust mise config
        run: mise trust --yes mise.toml

      - name: Install mise tools
        run: mise install --locked

      - name: Run linters
        run: just check
