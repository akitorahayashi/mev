name: Setup Brew Formulae

on:
  workflow_call:

jobs:
  setup-brew-formulae:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup base environment
        uses: ./.github/actions/setup-base

      - name: Setup GitHub authentication for Homebrew
        run: |
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: bearer ${{ github.token }}"

      - name: Run Homebrew formulae setup for common
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: just run make brew-formulae

      - name: Cleanup GitHub authentication header
        if: always()
        shell: bash
        run: |
          git config --global --unset-all http.https://github.com/.extraheader || true
