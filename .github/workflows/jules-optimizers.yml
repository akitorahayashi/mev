            --commit-message "jules: publish implementer plans lane" \
            --pr-title "chore: publish implementer plans lane" \
            --pr-body "Automated publication cleanup for plans lane implementer issues."


      - name: Wait for implementer issue publication sync PR merge
        id: wait_for_sync_pr
        if: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').applied == true }}
        env:
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
          PR_NUMBER: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').pr_number }}
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            jlo workflow gh inspect-pr-merge "$PR_NUMBER"
          max_attempts: '60'
          retry_on: error
