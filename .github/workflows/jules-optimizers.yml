# This file is auto-generated. Do not edit manually.
# Jules Agent Orchestration
#
# Orchestrates optimizer layer execution in sequence.
# Implementer PR metadata and auto-merge are delegated to dedicated workflows.
# Layer/task orchestration is command-driven through `jlo workflow`.

name: Jules Optimizers

on:
  schedule:

    - cron: '0 19 * * *'

  workflow_dispatch:
    inputs:
      entry_point:
        description: 'Start from layer'
        type: choice
        options:
          - narrator
          - observers
          - merger
          - dispatcher
          - planner
          - implementer
        default: narrator
      wait_minutes:
        description: 'Minutes to wait between layers (Jules async processing time)'
        type: number
        default: 30

      tag:
        description: 'Observer tag filter'
        type: choice
        options:
          - all

          - testing

        default: all

      mock:
        description: 'Run in mock mode (creates branches/PRs without Jules API)'
        type: boolean
        default: false
  workflow_call:
    inputs:
      entry_point:
        description: 'Start from layer'
        type: string
        default: narrator
      wait_minutes:
        description: 'Minutes to wait between layers (Jules async processing time)'
        type: number
        default: 30
      mock:
        description: 'Run in mock mode (creates branches/PRs without Jules API)'
        type: boolean
        default: false

permissions: {}

concurrency:
  group: 'jules-worker'
  cancel-in-progress: false

env:
  WAIT_MINUTES: ${{ github.event_name == 'workflow_call' && (inputs.wait_minutes || 30) || github.event_name == 'workflow_dispatch' && (github.event.inputs.wait_minutes || 30) || 30 }}
  MOCK_MODE: ${{ github.event_name == 'workflow_call' && inputs.mock == true || github.event_name == 'workflow_dispatch' && github.event.inputs.mock == 'true' }}
  JULES_MOCK_TAG: ${{ format('mock_run_{0}', github.run_id) }}
  JLO_RUN_FLAGS: ${{ ((github.event_name == 'workflow_call' && inputs.mock == true) || (github.event_name == 'workflow_dispatch' && github.event.inputs.mock == 'true')) && '--mock' || '' }}
  OBSERVER_TAG_FILTER: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.tag || 'all') || 'all' }}
  JLO_TARGET_BRANCH: 'main'
  JULES_WORKER_BRANCH: 'jules'





jobs:
  consume-schedule-ticket:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      allowed: ${{ steps.consume.outputs.allowed }}
    steps:
      - name: Consume schedule ticket
        id: consume
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
          REPOSITORY: ${{ github.repository }}
          SCHEDULE_TICKET: ${{ vars.JLO_OPTIMIZERS_SCHEDULE_TICKET || 'false' }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" != "schedule" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${SCHEDULE_TICKET}" != "true" ]; then
            echo "No optimizer schedule ticket is available; skipping scheduled run."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh variable set JLO_OPTIMIZERS_SCHEDULE_TICKET --repo "${REPOSITORY}" --body "false"
          echo "allowed=true" >> "$GITHUB_OUTPUT"

  # ============================================================
  # Phase 0: Bootstrap runtime repository on worker branch
  # ============================================================





  bootstrap:
    
    needs: ["consume-schedule-ticket"]
    
    if: >-
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') &&
      
      needs.consume-schedule-ticket.result == 'success' && needs.consume-schedule-ticket.outputs.allowed == 'true'
      
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    steps:
      - name: Validate branch variables
        run: |
          set -euo pipefail
          if [ -z "${JLO_TARGET_BRANCH:-}" ]; then
            echo "::error::JLO_TARGET_BRANCH is required."
            exit 1
          fi
          if [ -z "${JULES_WORKER_BRANCH:-}" ]; then
            echo "::error::JULES_WORKER_BRANCH is required."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Sync worker branch
        run: jlo workflow bootstrap worker-branch

      - name: Bootstrap managed files
        run: jlo workflow bootstrap managed-files

      - name: Clean exchange directory state
        if: ${{ env.MOCK_MODE != 'true' }}
        env:
          PRESERVE_EXCHANGE: ${{ github.event_name == 'workflow_call' && inputs.entry_point == 'implementer' && 'plans ready-requirements' || github.event_name == 'workflow_dispatch' && github.event.inputs.entry_point == 'implementer' && 'plans ready-requirements' || '' }}
        run: |
          set -euo pipefail
          has_preserve=false
          preserve_args=()
          for preserve in ${PRESERVE_EXCHANGE}; do
            has_preserve=true
            preserve_args+=(--preserve "${preserve}")
          done
          if [ "${has_preserve}" = "true" ]; then
            jlo workflow bootstrap clean-exchange "${preserve_args[@]}"
          else
            jlo workflow bootstrap clean-exchange
          fi

      - name: Validate repository structure
        run: jlo workflow doctor structure

      - name: Create bootstrap sync PR to worker branch
        id: sync_pr
        run: |
          set -euo pipefail
          pr_body=$(cat <<EOF
          Automated bootstrap update for the runtime workspace.

          - synchronize ${JLO_TARGET_BRANCH} into ${JULES_WORKER_BRANCH} via \`jlo workflow bootstrap worker-branch\`
          - bootstrap managed files via \`jlo workflow bootstrap managed-files\`
          - reset exchange state via \`jlo workflow bootstrap clean-exchange\`
          EOF
          )
          jlo_version="$(jlo --version | cut -d ' ' -f 2)"
          jlo workflow create-sync-pr \
            --change-token "bootstrap" \
            --commit-message "chore: bootstrap .jules/ runtime repository [jlo ${jlo_version}]" \
            --pr-title "chore: bootstrap runtime workspace" \
            --pr-body "${pr_body}"


      - name: Wait for bootstrap sync PR merge
        id: wait_for_sync_pr
        if: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').applied == true }}
        env:
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
          PR_NUMBER: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').pr_number }}
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            jlo workflow gh inspect-pr-merge "$PR_NUMBER"
          max_attempts: '60'
          retry_on: error
          retry_on_exit_codes: '11'
          retry_delay_seconds: '5'


  # ============================================================
  # Phase 1: Resolve run plan
  # ============================================================
  resolve-optimizers-plan:
    needs: [bootstrap]
    if: |
      needs.bootstrap.result == 'success' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      json: ${{ steps.check.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Resolve optimizers plan
        id: check
        env:
          EVENT_NAME: ${{ github.event_name == 'workflow_call' && 'workflow_dispatch' || github.event_name }}
          ENTRY_POINT: ${{ github.event_name == 'workflow_call' && (inputs.entry_point || 'narrator') || github.event_name == 'workflow_dispatch' && (github.event.inputs.entry_point || 'narrator') || '' }}
          JLO_SKIP_NARRATOR: ${{ vars.JLO_SKIP_NARRATOR || 'true' }}
        run: |
          set -euo pipefail
          jlo workflow resolve optimizers-plan "$EVENT_NAME" --entry-point "$ENTRY_POINT"


  # ============================================================
  # Phase 2: Run narrator
  # ============================================================

  
  
  
  request-narrator-run:
    needs: ["resolve-optimizers-plan"]
    
    if: |
      !cancelled() &&


      needs.resolve-optimizers-plan.result == 'success' &&

      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_narrator == true

    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      json: ${{ steps.run.outputs.json }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}
      - name: Run narrator
        id: run
        run: |
          set -euo pipefail
          result=$(jlo run --json narrator ${{ env.JLO_RUN_FLAGS }})
          echo "${result}"
          echo "json=${result}" >> "$GITHUB_OUTPUT"

  report-narrator-status:
    needs: ["resolve-optimizers-plan", "request-narrator-run"]
    if: |
      !cancelled() &&
      always() &&
      needs.resolve-optimizers-plan.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      json: ${{ steps.report.outputs.json }}
    steps:
      - name: Report Run narrator status
        id: report
        shell: bash
        run: |
          set -euo pipefail
          requested_flag='${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_narrator == true }}'
          request_result='${{ needs.request-narrator-run.result }}'
          request_count='${{ fromJSON(needs.request-narrator-run.outputs.json || '{}').number_of_api_requests_succeeded || 0 }}'
          should_wait='${{ fromJSON(needs.request-narrator-run.outputs.json || '{}').should_wait == true }}'
          if [ "${requested_flag}" = "true" ]; then
            if [ "${request_result}" != "success" ]; then
              echo "::error::Expected successful run request for 'narrator' but got '${request_result}'."
              exit 1
            fi
            requested=false
            if [ "${should_wait}" = "true" ]; then
              requested=true
            fi
          else
            if [ "${request_result}" != "skipped" ]; then
              echo "::error::Expected skipped run request for 'narrator' but got '${request_result}'."
              exit 1
            fi
            requested=false
          fi

          json="$(printf '{"requested":%s,"count":%s}\n' "${requested}" "${request_count}")"
          echo "${json}"
          echo "json=${json}" >> "$GITHUB_OUTPUT"
  # ============================================================
  # Phase 3: Wait after narrator
  # ============================================================

  wait-after-narrator:
    needs: ['report-narrator-status']
    if: |
      !cancelled() &&
      needs.report-narrator-status.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Wait ${{ env.WAIT_MINUTES }} minutes for Jules async processing
        uses: akitorahayashi/wait@v1
        with:
          enabled: ${{ fromJSON(needs.report-narrator-status.outputs.json || '{}').requested == true }}
          minutes: ${{ env.WAIT_MINUTES }}
          seconds: ${{ env.MOCK_MODE == 'true' && '15' || '' }}
          label: 'Jules async processing for narrator'
  # ============================================================
  # Phase 4: Resolve and run observers (matrix)
  # ============================================================

  resolve-observers-matrix:
    needs: ["wait-after-narrator"]
    if: |
      !cancelled() &&

      needs.wait-after-narrator.result == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    outputs:
      json: ${{ steps.resolve.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Resolve observers targets
        id: resolve
        run: |
          set -euo pipefail
          if [ "${MOCK_MODE}" = "true" ]; then
            jlo workflow resolve matrix --layer observers --mock --tag "${OBSERVER_TAG_FILTER}"
          else
            jlo workflow resolve matrix --layer observers --tag "${OBSERVER_TAG_FILTER}"
          fi

  
  
  
  request-observers-run:
    needs: ["resolve-optimizers-plan", "resolve-observers-matrix"]
    
    if: |
      !cancelled() &&



      needs.resolve-optimizers-plan.result == 'success' &&

      needs.resolve-observers-matrix.result == 'success' &&

      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_observers == true &&
      fromJSON(needs.resolve-observers-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Jules API session creation requests must run strictly one-by-one.
    # Keep max-parallel fixed to 1; worker limits are enforced by target truncation at matrix-resolution time.
    # The matrix is kept for visibility of resolved target count in the GitHub Actions GUI.
    strategy:
      matrix:
        include: ${{ fromJSON(needs.resolve-observers-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').matrix }}
      max-parallel: 1
      fail-fast: false
    outputs:
      json: ${{ steps.run.outputs.json }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Run observers (${{ matrix.target }})
        id: run
        run: |
          set -euo pipefail
          result=$(jlo run --json observers --role "${{ matrix.target }}" ${{ env.JLO_RUN_FLAGS }} --task emit_events)
          echo "${result}"
          echo "json=${result}" >> "$GITHUB_OUTPUT"

  report-observers-status:
    needs: ["resolve-optimizers-plan", "resolve-observers-matrix", "request-observers-run"]
    if: |
      !cancelled() &&
      always() &&
      needs.resolve-optimizers-plan.result == 'success' &&
      needs.resolve-observers-matrix.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      json: ${{ steps.report.outputs.json }}
    steps:
      - name: Report Run observers status
        id: report
        shell: bash
        run: |
          set -euo pipefail
          requested_flag='${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_observers == true }}'
          target_count='${{ fromJSON(needs.resolve-observers-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count }}'
          request_result='${{ needs.request-observers-run.result }}'
          if [ "${requested_flag}" = "true" ]; then
            if [ "${target_count}" = "0" ]; then
              if [ "${request_result}" != "skipped" ]; then
                echo "::error::Expected skipped run request for 'observers' with zero targets but got '${request_result}'."
                exit 1
              fi
              requested=false
            else
              if [ "${request_result}" != "success" ]; then
                echo "::error::Expected successful run request for 'observers' but got '${request_result}'."
                exit 1
              fi
              requested=true
            fi
          else
            if [ "${request_result}" != "skipped" ]; then
              echo "::error::Expected skipped run request for 'observers' but got '${request_result}'."
              exit 1
            fi
            requested=false
          fi

          count=0
          if [ "${requested}" = "true" ]; then
            count="${target_count}"
          fi

          json="$(printf '{"requested":%s,"count":%s}\n' "${requested}" "${count}")"
          echo "${json}"
          echo "json=${json}" >> "$GITHUB_OUTPUT"
  # ============================================================
  # Phase 5: Wait after observers
  # ============================================================

  wait-after-observers:
    needs: ['report-observers-status']
    if: |
      !cancelled() &&
      needs.report-observers-status.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Wait ${{ env.WAIT_MINUTES }} minutes for Jules async processing
        uses: akitorahayashi/wait@v1
        with:
          enabled: ${{ fromJSON(needs.report-observers-status.outputs.json || '{}').requested == true }}
          minutes: ${{ env.WAIT_MINUTES }}
          seconds: ${{ env.MOCK_MODE == 'true' && '15' || '' }}
          label: 'Jules async processing for observers'
  # ============================================================
  # Phase 6: Run merger
  # ============================================================

  
  
  
  request-merger-run:
    needs: ["resolve-optimizers-plan", "wait-after-observers"]
    
    if: |
      !cancelled() &&


      needs.resolve-optimizers-plan.result == 'success' &&

      needs.wait-after-observers.result == 'success' &&

      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_merger == true

    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      json: ${{ steps.run.outputs.json }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}
      - name: Run merger
        id: run
        run: |
          set -euo pipefail
          result=$(jlo run --json merger ${{ env.JLO_RUN_FLAGS }})
          echo "${result}"
          echo "json=${result}" >> "$GITHUB_OUTPUT"

  report-merger-status:
    needs: ["resolve-optimizers-plan", "wait-after-observers", "request-merger-run"]
    if: |
      !cancelled() &&
      always() &&
      needs.resolve-optimizers-plan.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      json: ${{ steps.report.outputs.json }}
    steps:
      - name: Report Run merger status
        id: report
        shell: bash
        run: |
          set -euo pipefail
          requested_flag='${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_merger == true }}'
          request_result='${{ needs.request-merger-run.result }}'
          request_count='${{ fromJSON(needs.request-merger-run.outputs.json || '{}').number_of_api_requests_succeeded || 0 }}'
          should_wait='${{ fromJSON(needs.request-merger-run.outputs.json || '{}').should_wait == true }}'
          if [ "${requested_flag}" = "true" ]; then
            if [ "${request_result}" != "success" ]; then
              echo "::error::Expected successful run request for 'merger' but got '${request_result}'."
              exit 1
            fi
            requested=false
            if [ "${should_wait}" = "true" ]; then
              requested=true
            fi
          else
            if [ "${request_result}" != "skipped" ]; then
              echo "::error::Expected skipped run request for 'merger' but got '${request_result}'."
              exit 1
            fi
            requested=false
          fi

          json="$(printf '{"requested":%s,"count":%s}\n' "${requested}" "${request_count}")"
          echo "${json}"
          echo "json=${json}" >> "$GITHUB_OUTPUT"
  # ============================================================
  # Phase 7: Wait after merger
  # ============================================================

  wait-after-merger:
    needs: ['report-merger-status']
    if: |
      !cancelled() &&
      needs.report-merger-status.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Wait ${{ env.WAIT_MINUTES }} minutes for Jules async processing
        uses: akitorahayashi/wait@v1
        with:
          enabled: ${{ fromJSON(needs.report-merger-status.outputs.json || '{}').requested == true }}
          minutes: ${{ env.WAIT_MINUTES }}
          seconds: ${{ env.MOCK_MODE == 'true' && '15' || '' }}
          label: 'Jules async processing for merger'
  # ============================================================
  # Phase 8: Run dispatcher
  # ============================================================

  
  
  
  request-dispatcher-run:
    needs: ["resolve-optimizers-plan", "wait-after-merger"]
    
    if: |
      !cancelled() &&


      needs.resolve-optimizers-plan.result == 'success' &&

      needs.wait-after-merger.result == 'success' &&

      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_dispatcher == true

    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      json: ${{ steps.run.outputs.json }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}
      - name: Run dispatcher
        id: run
        run: |
          set -euo pipefail
          result=$(jlo run --json dispatcher ${{ env.JLO_RUN_FLAGS }})
          echo "${result}"
          echo "json=${result}" >> "$GITHUB_OUTPUT"

  report-dispatcher-status:
    needs: ["resolve-optimizers-plan", "wait-after-merger", "request-dispatcher-run"]
    if: |
      !cancelled() &&
      always() &&
      needs.resolve-optimizers-plan.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      json: ${{ steps.report.outputs.json }}
    steps:
      - name: Report Run dispatcher status
        id: report
        shell: bash
        run: |
          set -euo pipefail
          requested_flag='${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_dispatcher == true }}'
          request_result='${{ needs.request-dispatcher-run.result }}'
          request_count='${{ fromJSON(needs.request-dispatcher-run.outputs.json || '{}').number_of_api_requests_succeeded || 0 }}'
          should_wait='${{ fromJSON(needs.request-dispatcher-run.outputs.json || '{}').should_wait == true }}'
          if [ "${requested_flag}" = "true" ]; then
            if [ "${request_result}" != "success" ]; then
              echo "::error::Expected successful run request for 'dispatcher' but got '${request_result}'."
              exit 1
            fi
            requested=false
            if [ "${should_wait}" = "true" ]; then
              requested=true
            fi
          else
            if [ "${request_result}" != "skipped" ]; then
              echo "::error::Expected skipped run request for 'dispatcher' but got '${request_result}'."
              exit 1
            fi
            requested=false
          fi

          json="$(printf '{"requested":%s,"count":%s}\n' "${requested}" "${request_count}")"
          echo "${json}"
          echo "json=${json}" >> "$GITHUB_OUTPUT"
  # ============================================================
  # Phase 9: Wait after dispatcher
  # ============================================================

  wait-after-dispatcher:
    needs: ['report-dispatcher-status']
    if: |
      !cancelled() &&
      needs.report-dispatcher-status.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Wait ${{ env.WAIT_MINUTES }} minutes for Jules async processing
        uses: akitorahayashi/wait@v1
        with:
          enabled: ${{ fromJSON(needs.report-dispatcher-status.outputs.json || '{}').requested == true }}
          minutes: ${{ env.WAIT_MINUTES }}
          seconds: ${{ env.MOCK_MODE == 'true' && '15' || '' }}
          label: 'Jules async processing for dispatcher'
  # ============================================================
  # Phase 10: Publish requirements lane to implementer issues
  # ============================================================

  publish-implementer-requirements:
    needs: ["wait-after-dispatcher"]
    if: |
      !cancelled() &&
      needs.wait-after-dispatcher.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Publish implementer issues (requirements)
        id: publish
        run: |
          set -euo pipefail
          jlo workflow publish implementer-issues requirements

      - name: Validate structure
        run: jlo workflow doctor structure

      - name: Create sync PR
        id: sync_pr
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain .jules)" ]; then
            echo "No implementer issue publication changes detected."
            exit 0
          fi
          jlo workflow create-sync-pr \
            --change-token "publish-implementer-requirements" \
            --commit-message "jules: publish implementer requirements lane" \
            --pr-title "chore: publish implementer requirements lane" \
            --pr-body "Automated publication cleanup for requirements lane implementer issues."


      - name: Wait for implementer issue publication sync PR merge
        id: wait_for_sync_pr
        if: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').applied == true }}
        env:
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
          PR_NUMBER: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').pr_number }}
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            jlo workflow gh inspect-pr-merge "$PR_NUMBER"
          max_attempts: '60'
          retry_on: error
          retry_on_exit_codes: '11'
          retry_delay_seconds: '5'

      - name: Roll back published issues on sync failure
        if: ${{ always() && steps.publish.outcome == 'success' && fromJSON(steps.publish.outputs.json || '{}').published_count > 0 && (steps.sync_pr.outcome == 'failure' || (fromJSON(steps.sync_pr.outputs.json || '{}').applied == true && steps.wait_for_sync_pr.outcome == 'failure')) }}
        env:
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
          PUBLISHED_JSON: ${{ steps.publish.outputs.json || '{}' }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Rolling back published implementer issues because worker-branch sync was not completed."
          jq -r '.published[]?.issue_number' <<<"${PUBLISHED_JSON}" | while read -r issue_number; do
            if [ -n "${issue_number}" ]; then
              gh issue close "${issue_number}" --repo "${REPO}"
            fi
          done
  # ============================================================
  # Phase 11: Resolve and run planner (matrix)
  # ============================================================

  resolve-planner-matrix:
    needs: ["wait-after-dispatcher"]
    if: |
      !cancelled() &&

      needs.wait-after-dispatcher.result == 'success'

