  # ============================================================
  # Phase 15: Cleanup mock artifacts
  # ============================================================


  cleanup-mock-artifacts:
    needs: ["wait-after-planner", "report-implementer-status"]
    if: |
      !cancelled() &&
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.mock == 'true') ||
