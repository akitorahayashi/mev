        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Run planner (${{ matrix.target }})
        id: run
        run: |
          set -euo pipefail
          result=$(jlo run --json planner --requirement "${{ matrix.target }}" ${{ env.JLO_RUN_FLAGS }})
          echo "${result}"
          echo "json=${result}" >> "$GITHUB_OUTPUT"

  report-planner-status:
    needs: ["resolve-optimizers-plan", "resolve-planner-matrix", "request-planner-run"]
    if: |
      !cancelled() &&
      always() &&
      needs.resolve-optimizers-plan.result == 'success' &&
      needs.resolve-planner-matrix.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      json: ${{ steps.report.outputs.json }}
    steps:
      - name: Report Run planner status
        id: report
        shell: bash
        run: |
          set -euo pipefail
          requested_flag='${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_planner == true }}'
          target_count='${{ fromJSON(needs.resolve-planner-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count }}'
          request_result='${{ needs.request-planner-run.result }}'
          if [ "${requested_flag}" = "true" ]; then
            if [ "${target_count}" = "0" ]; then
              if [ "${request_result}" != "skipped" ]; then
                echo "::error::Expected skipped run request for 'planner' with zero targets but got '${request_result}'."
                exit 1
              fi
              requested=false
            else
              if [ "${request_result}" != "success" ]; then
                echo "::error::Expected successful run request for 'planner' but got '${request_result}'."
                exit 1
              fi
              requested=true
            fi
          else
            if [ "${request_result}" != "skipped" ]; then
              echo "::error::Expected skipped run request for 'planner' but got '${request_result}'."
              exit 1
            fi
            requested=false
          fi

          count=0
          if [ "${requested}" = "true" ]; then
            count="${target_count}"
          fi

          json="$(printf '{"requested":%s,"count":%s}\n' "${requested}" "${count}")"
          echo "${json}"
          echo "json=${json}" >> "$GITHUB_OUTPUT"
  # ============================================================
  # Phase 12: Wait for planner PRs
  # ============================================================
  # Matrix boundary is reported in the macro so planner skip/zero-target
  # behavior does not leak into downstream implementer gating.

  wait-after-planner:
    needs: ['report-planner-status']
    if: |
      !cancelled() &&
      needs.report-planner-status.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Wait ${{ env.WAIT_MINUTES }} minutes for Jules async processing
        uses: akitorahayashi/wait@v1
        with:
          enabled: ${{ fromJSON(needs.report-planner-status.outputs.json || '{}').requested == true }}
          minutes: ${{ env.WAIT_MINUTES }}
          seconds: ${{ env.MOCK_MODE == 'true' && '15' || '' }}
          label: 'Jules async processing for planner'
  # ============================================================
  # Phase 13: Publish plans lane to implementer issues
  # ============================================================

  publish-implementer-plans:
    needs: ["wait-after-planner"]
    if: |
      !cancelled() &&
      needs.wait-after-planner.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
