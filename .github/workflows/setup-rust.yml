name: Setup Rust

on:
  workflow_call:

jobs:
  setup-rust:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup base environment
        uses: ./.github/actions/setup-base

      - name: Setup rust
        run: just run make rust
