# jlo execution configuration

[run]
jlo_target_branch = "main"
jules_worker_branch = "jules"

[workflow]
runner_mode = "remote"
wait_minutes_default = 30
jules_api_worker_max_parallel = 15

[workflow.layers.innovators]
roles = [
  { name = "leverage_architect", enabled = true, proposal_file_limit = 3 },
]

[workflow.layers.reporter]
update_file_limit = 5

[workflow.layers.observers]
roles = [
  { name = "consistency", enabled = true, event_file_limit = 3 },
  { name = "taxonomy", enabled = true, event_file_limit = 3 },
  { name = "data_arch", enabled = true, event_file_limit = 3 },
  { name = "structural_arch", enabled = true, event_file_limit = 3 },
  { name = "qa", enabled = true, event_file_limit = 3 },
  { name = "cov", enabled = true, event_file_limit = 3 },
  { name = "rustacean", enabled = true, event_file_limit = 3 },
  { name = "devops", enabled = true, event_file_limit = 3 },
  { name = "cli_sentinel", enabled = true, event_file_limit = 3 },
]

[workflow.layers.implementer]

[schedule]
cron = ["0 19 * * *"]
skip_narrator_on_schedule = false

